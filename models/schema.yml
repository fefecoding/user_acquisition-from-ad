version: 2

models:
  - name: dim_campaign
    description: Campaign dimension table with unique campaign identifiers
    columns:
      - name: campaign_id
        description: Surrogate key for campaign
        tests:
          - unique
          - not_null
      - name: campaign_name
        description: Name of the campaign
        tests:
          - not_null
      - name: created_at
        description: Timestamp when record was created
      - name: updated_at
        description: Timestamp when record was last updated

  - name: dim_network
    description: Network dimension table with unique network identifiers
    columns:
      - name: network_id
        description: Surrogate key for network
        tests:
          - unique
          - not_null
      - name: network_name
        description: Name of the advertising network
        tests:
          - not_null
      - name: created_at
        description: Timestamp when record was created
      - name: updated_at
        description: Timestamp when record was last updated

  - name: dim_platform
    description: Platform dimension table with unique platform identifiers
    columns:
      - name: platform_id
        description: Surrogate key for platform
        tests:
          - unique
          - not_null
      - name: platform
        description: Mobile platform (android, ios)
        tests:
          - not_null
          - accepted_values:
              values: ['android', 'ios']
      - name: created_at
        description: Timestamp when record was created
      - name: updated_at
        description: Timestamp when record was last updated

  - name: dim_date
    description: Date dimension table for time-based analysis
    columns:
      - name: date_id
        description: Surrogate key for date
        tests:
          - unique
          - not_null
      - name: date
        description: Calendar date
        tests:
          - not_null
      - name: year
        description: Calendar year
      - name: month
        description: Calendar month (1-12)
      - name: day
        description: Calendar day (1-31)
      - name: quarter
        description: Calendar quarter (1-4)
      - name: week_of_year
        description: Week number of the year
      - name: day_of_week
        description: Day of the week name
      - name: day_type
        description: Weekday or Weekend
      - name: season
        description: Season of the year
      - name: created_at
        description: Timestamp when record was created
      - name: updated_at
        description: Timestamp when record was last updated

  - name: fact_campaign_performance
    description: Fact table containing campaign performance metrics
    columns:
      - name: campaign_performance_id
        description: Surrogate key for campaign performance record
        tests:
          - unique
          - not_null
      - name: campaign_id
        description: Foreign key to campaign dimension
        tests:
          - not_null
          - relationships:
              to: ref('dim_campaign')
              field: campaign_id
      - name: network_id
        description: Foreign key to network dimension
        tests:
          - not_null
          - relationships:
              to: ref('dim_network')
              field: network_id
      - name: platform_id
        description: Foreign key to platform dimension
        tests:
          - not_null
          - relationships:
              to: ref('dim_platform')
              field: platform_id
      - name: date_id
        description: Foreign key to date dimension
        tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_id
      - name: total_revenue
        description: Total revenue generated by the campaign
        tests:
          - not_null
          - relationships:
              to: ref('stg_campaign_metrics')
              field: total_revenue
      - name: total_users
        description: Total number of users acquired
        tests:
          - not_null
          - relationships:
              to: ref('stg_campaign_metrics')
              field: total_users
      - name: total_spend
        description: Total advertising spend
        tests:
          - not_null
          - relationships:
              to: ref('stg_campaign_metrics')
              field: total_spend
      - name: arpu
        description: Average Revenue Per User
        tests:
          - not_null
          - relationships:
              to: ref('stg_campaign_metrics')
              field: arpu
      - name: roas
        description: Return on Ad Spend
        tests:
          - not_null
          - relationships:
              to: ref('stg_campaign_metrics')
              field: roas
      - name: conversion_rate
        description: Conversion rate percentage
        tests:
          - not_null
          - relationships:
              to: ref('stg_campaign_metrics')
              field: conversion_rate
      - name: forecasted_revenue
        description: Forecasted future revenue
        tests:
          - not_null
          - relationships:
              to: ref('stg_campaign_metrics')
              field: forecasted_revenue
      - name: high_roas_prob
        description: Probability of achieving high ROAS
        tests:
          - not_null
          - relationships:
              to: ref('stg_campaign_metrics')
              field: high_roas_prob
      - name: created_at
        description: Timestamp when record was created
      - name: updated_at
        description: Timestamp when record was last updated

  - name: stg_spend
    description: Staging table for advertising spend data
    columns:
      - name: spend_id
        description: Surrogate key for spend record
        tests:
          - unique
          - not_null
      - name: date
        description: Date of spend
        tests:
          - not_null
      - name: platform
        description: Platform for the spend
        tests:
          - not_null
          - accepted_values:
              values: ['android', 'ios']
      - name: network_name
        description: Advertising network
        tests:
          - not_null
      - name: campaign_name
        description: Campaign name
        tests:
          - not_null
      - name: spend
        description: Amount spent
        tests:
          - not_null
          - relationships:
              to: ref('spend')
              field: spend
      - name: created_at
        description: Timestamp when record was created
      - name: updated_at
        description: Timestamp when record was last updated

  - name: stg_user_data
    description: Staging table for user acquisition data
    columns:
      - name: user_id
        description: Surrogate key for user record
        tests:
          - unique
          - not_null
      - name: adid
        description: Advertising ID
        tests:
          - not_null
      - name: platform
        description: User's platform
        tests:
          - not_null
          - accepted_values:
              values: ['android', 'ios']
      - name: install_date
        description: Date of app installation
        tests:
          - not_null
      - name: campaign_name
        description: Campaign that acquired the user
        tests:
          - not_null
      - name: network_name
        description: Network that acquired the user
        tests:
          - not_null
      - name: revenue_usd
        description: Revenue generated by user
        tests:
          - relationships:
              to: ref('user_data')
              field: revenue_usd
      - name: cv_bucket
        description: Conversion value bucket for iOS opt-out users
        tests:
          - relationships:
              to: ref('dim_cv_bucket')
              field: cv_bucket
      - name: tracking_status
        description: User's tracking status
        tests:
          - accepted_values:
              values: ['Opt in', 'Opt out']
      - name: created_at
        description: Timestamp when record was created
      - name: updated_at
        description: Timestamp when record was last updated

sources:
  - name: raw_data
    description: Raw data sources
    tables:
      - name: spend
        description: Raw spend data from advertising platforms
        columns:
          - name: date
            description: Date of spend
            tests:
              - not_null
          - name: platform
            description: Platform (android, ios)
            tests:
              - not_null
              - accepted_values:
                  values: ['android', 'ios']
          - name: network_name
            description: Advertising network name
            tests:
              - not_null
          - name: campaign_name
            description: Campaign name
            tests:
              - not_null
          - name: spend
            description: Amount spent in USD
            tests:
              - not_null
              - relationships:
                  to: ref('stg_spend')
                  field: spend

      - name: user_data
        description: Raw user acquisition data
        columns:
          - name: adid
            description: Advertising ID
            tests:
              - not_null
          - name: platform
            description: User's platform
            tests:
              - not_null
              - accepted_values:
                  values: ['android', 'ios']
          - name: install_date
            description: Date of app installation
            tests:
              - not_null
          - name: campaign_name
            description: Campaign that acquired the user
            tests:
              - not_null
          - name: network_name
            description: Network that acquired the user
            tests:
              - not_null
          - name: revenue_usd
            description: Revenue generated by user
          - name: cv_bucket
            description: Conversion value bucket for iOS opt-out users
          - name: tracking_status
            description: User's tracking status
            tests:
              - accepted_values:
                  values: ['Opt in', 'Opt out']

      - name: dim_cv_bucket
        description: Conversion value bucket mapping for iOS opt-out users
        columns:
          - name: cv_bucket
            description: Conversion value bucket number
            tests:
              - not_null
              - unique
          - name: rev_min
            description: Minimum revenue for the bucket
            tests:
              - not_null
          - name: rev_max
            description: Maximum revenue for the bucket
            tests:
              - not_null