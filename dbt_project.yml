name: 'ua_analytics_portfolio'
version: '1.0.0'

# Personal project configuration
# This is a portfolio project demonstrating advanced analytics engineering skills

profile: 'voodoo_case'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

models:
  ua_analytics_portfolio:
    +materialized: view
    
    staging:
      +materialized: view
      
    mart:
      +materialized: table
      
      # Performance optimizations
      fact_campaign_daily:
        +materialized: incremental
        +unique_key: campaign_daily_id
        +incremental_strategy: merge
        +partition_by:
          field: date
          data_type: date
          granularity: day
        +cluster_by: ["platform_id", "network_id", "campaign_id"]
        
      fact_campaign_performance:
        +materialized: table
        +unique_key: campaign_performance_id
        
      fact_campaign_summary:
        +materialized: table
        +unique_key: summary_id
        
      dim_campaign:
        +materialized: table
        +unique_key: campaign_id
        
      dim_network:
        +materialized: table
        +unique_key: network_id
        
      dim_platform:
        +materialized: table
        +unique_key: platform_id
        
      dim_date:
        +materialized: table
        +unique_key: date_id
        
      dim_campaign_performance_tier:
        +materialized: table
        +unique_key: performance_tier_id
        
    governance:
      +materialized: table
      
      governance_data_quality:
        +unique_key: quality_check_id
        
      governance_data_lineage:
        +unique_key: lineage_id

seeds:
  ua_analytics_portfolio:
    spend:
      +file: seeds/spend.csv
      +header: true
      +delimiter: ','
    user_data:
      +file: seeds/user_data.csv
      +header: true
      +delimiter: ','
    dim_cv_bucket:
      +file: seeds/dim_cv_bucket.csv
      +header: true
      +delimiter: ','
    campaign_analysis:
      +file: seeds/campaign_analysis.csv
      +header: true
      +delimiter: ','

# Data quality tests configuration
tests:
  ua_analytics_portfolio:
    +severity: warn
    +store_failures: true
    +fail_calc: count(*)
    +limit: 1000

# On-run-start hooks for data governance
on-run-start:
  - "{{ log('Starting dbt run - Portfolio Project: User Acquisition Analytics', info=True) }}"
  - "ALTER SESSION SET QUERY_TAG = 'ua_portfolio_{{ run_started_at }}'"

# On-run-end hooks
on-run-end:
  - "{{ log('dbt run completed successfully', info=True) }}"